name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_crates_io:
        description: Publish the packaged crate to crates.io
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: agent-exec-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Smoke test
        shell: bash
        env:
          AGENT_EXEC_ROOT: ${{ runner.temp }}/agent-exec-smoke
        run: |
          binary="target/${{ matrix.target }}/release/agent-exec"
          if [ "${{ runner.os }}" = "Windows" ]; then binary="$binary.exe"; fi
          "$binary" --version
          "$binary" run -- echo release-smoke | python3 -c 'import json, sys; response = json.load(sys.stdin); assert response["ok"] is True; assert response["state"] == "exited"; assert response["exit_code"] == 0'
      - name: Package archive and checksum
        shell: bash
        run: |
          mkdir dist
          binary="target/${{ matrix.target }}/release/agent-exec"
          if [ "${{ runner.os }}" = "Windows" ]; then
            binary="$binary.exe"
            cp "$binary" agent-exec.exe
            7z a "dist/${{ matrix.archive }}" agent-exec.exe
          else
            cp "$binary" agent-exec
            tar -czf "dist/${{ matrix.archive }}" agent-exec
          fi
          cd dist
          shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  package-smoke:
    name: Verify packaged crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Package and install in isolation
        shell: bash
        run: |
          cargo package --locked
          target_dir=$(cargo metadata --format-version 1 --no-deps | python3 -c 'import json,sys; print(json.load(sys.stdin)["target_directory"])')
          package_archive=$(printf '%s\n' "$target_dir"/package/agent-exec-*.crate)
          package_root=$(mktemp -d)
          tar -xzf "$package_archive" -C "$package_root"
          package_dir=$(printf '%s\n' "$package_root"/agent-exec-*)
          install_root=$(mktemp -d)
          cargo install --path "$package_dir" --root "$install_root" --locked
          "$install_root/bin/agent-exec" --version
          AGENT_EXEC_ROOT=$(mktemp -d) "$install_root/bin/agent-exec" run -- echo package-smoke | python3 -c 'import json, sys; response = json.load(sys.stdin); assert response["ok"] is True; assert response["state"] == "exited"; assert response["exit_code"] == 0'

  release:
    name: Publish GitHub Release
    needs: [build, package-smoke]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Verify checksums
        working-directory: dist
        run: |
          for checksum in *.sha256; do
            shasum -a 256 -c "$checksum"
          done
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes

  publish-crates-io:
    name: Publish crates.io
    needs: package-smoke
    if: github.event_name == 'workflow_dispatch' && inputs.publish_crates_io
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate and publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          test -n "$CARGO_REGISTRY_TOKEN" || { echo "CARGO_REGISTRY_TOKEN is required for crates.io publication" >&2; exit 1; }
          cargo package --locked
          cargo publish --locked
